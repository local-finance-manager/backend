name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            { echo "::error::go.mod/go.sum out of sync — run 'go mod tidy'"; exit 1; }

      - name: Check formatting (gofmt)
        run: |
          UNFORMATTED=$(gofmt -l ./...)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$UNFORMATTED"
            echo "Run: gofmt -w ./..."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Enforce minimum coverage per module (90%)
        # Cada pacote de negócio (domínio + serviço + repositório + handlers/rotas) deve ter
        # >= 90%. Os handlers/rotas são cobertos por testes de integração httptest + :memory:;
        # o adapter do Drive por um mock httptest; o OAuth Authorize via loopback + endpoint de
        # token mockado. Excluídos por natureza: cmd/server (wiring) e database/config/middleware.
        run: |
          MIN=90
          fail=0
          for pkg in \
            ./internal/backup/... \
            ./internal/category/... \
            ./internal/creditcard/... \
            ./internal/installment/... \
            ./internal/shared/... \
            ./internal/transaction/...; do
            pct=$(go test -covermode=atomic -cover "$pkg" 2>/dev/null | grep -o 'coverage: [0-9.]*%' | grep -o '[0-9.]*')
            printf '%-32s %6s%%\n' "$pkg" "$pct"
            if [ -z "$pct" ] || [ "$(echo "$pct < $MIN" | bc)" -eq 1 ]; then
              echo "::error::$pkg coverage ${pct}% is below the ${MIN}% per-module minimum"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "Todos os módulos >= ${MIN}% ✓"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary
        run: go build -ldflags="-s -w" -o bin/server ./cmd/server
