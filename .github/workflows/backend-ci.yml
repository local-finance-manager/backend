name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            { echo "::error::go.mod/go.sum out of sync — run 'go mod tidy'"; exit 1; }

      - name: Check formatting (gofmt)
        run: |
          UNFORMATTED=$(gofmt -l ./...)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$UNFORMATTED"
            echo "Run: gofmt -w ./..."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests with coverage
        # Packages without test files (cmd/server, database, config, middleware)
        # cause a "no such tool covdata" error in Go 1.25 when coverage is enabled.
        # Handler and routes are intentionally excluded from automated tests (manual
        # integration testing covers them per guia-tecnico §11.2), which caps
        # achievable coverage at ~65%. Threshold is set accordingly.
        run: |
          go test -coverprofile=coverage.out -covermode=atomic \
            ./internal/category/... \
            ./internal/shared/...

      - name: Coverage report per package
        run: go tool cover -func=coverage.out

      - name: Enforce minimum coverage (60%)
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "${TOTAL} < 60" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below the 60% minimum threshold"
            exit 1
          fi
          echo "Coverage ${TOTAL}% meets the threshold ✓"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary
        run: go build -ldflags="-s -w" -o bin/server ./cmd/server
