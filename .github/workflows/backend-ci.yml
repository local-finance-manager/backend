name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - '/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '/**'
      - '.github/workflows/backend-ci.yml'

# Cancela runs anteriores do mesmo PR para não desperdiçar minutos de CI
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            { echo "::error::go.mod/go.sum out of sync — run 'go mod tidy'"; exit 1; }

      - name: Check formatting (gofmt)
        run: |
          UNFORMATTED=$(gofmt -l ./...)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$UNFORMATTED"
            echo "Run: gofmt -w ./..."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run tests (race detector + coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage report per package
        run: go tool cover -func=coverage.out

      - name: Enforce minimum coverage (85%)
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "${TOTAL} < 85" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below the 85% minimum threshold"
            echo "::error::Add tests to reach the required coverage level"
            exit 1
          fi
          echo "Coverage ${TOTAL}% meets the 85% threshold ✓"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.out
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build binary
        run: go build -ldflags="-s -w" -o bin/server ./cmd/server
