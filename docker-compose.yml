name: financas

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "19742:19742"
    # A imagem scratch não copia o .env; injetamos as DRIVE_*/BACKUP_* no container
    # via env_file (RNF-BKP-09). O .env é criptografado com git-crypt no repo.
    env_file:
      - .env
    volumes:
      # token.json do OAuth2 (gerado por ./server -authorize) — D17
      - ${HOME}/.config/financas:/root/.config/financas
      # Banco de dados SQLite + sidecar de backup
      - ${HOME}/.local/share/financas:/root/.local/share/financas
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/server", "--health-check"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "19741:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
